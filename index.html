<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Practice Questions</title>
  <!-- Font Styling -->
  <style>
    body{
      font: 16px "Roboto" Arial sans-serif;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Assignment</h1>
      <nav>
        <ul>
          <li><a href="index.html">CSS Practical Coding Questions</a></li>
          <li><a href="veryBasic.html">HTML + CSS Practice Questions (Very Basic)</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <section>
      <!-- Change Text Color and Background -->
      <div>
        <!-- inline css -->
        <p style="background-color: aqua; color: green;">Question 1</p>
        <p style="background-color: aqua; color: green;">Question 1</p>
        <p style="background-color: aqua; color: green;">Question 1</p>
      </div>
    </section>
    <section>
      <!-- Use Class and ID Selectors -->
      <div class="box">
        <p id="title"> Second Practice Question.</p>
      </div>
      <!-- internal css -->
      <style>
        .box{
          width: 200px;
          height: 100px;
          background-color: lightblue;
        }
        #title{
          color: green;
          text-align: center;
        }
      </style>
    </section>
    <section>
      <!-- Apply Box Model Properties -->
      <div style="width: 250px;padding: 20px;border: 3px solid black;margin: 15px;">
        <p>Third Question</p>
      </div>
    </section>
    <section>
      <!-- Fix Box Size Using box-sizing -->
      <div style="width: 250px;padding: 20px;border: 3px solid black;margin: 15px;box-sizing: border-box">
        <p>Third Question with changes as fourth required</p>
      </div>
    </section>
    <section>
      <!-- Text Formatting Practice -->
      <h1 style="text-align: center; font-weight: bold; text-transform: uppercase;">fifth Question</h1>
    </section>
  </main>
</body>
</html>
